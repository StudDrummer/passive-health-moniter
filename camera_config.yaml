camera:
  source: 0
  use_gstreamer: true
  width: 1280
  height: 720
  fps: 30
  gstreamer_pipeline: "nvarguscamerasrc sensor-id=0 ! video/x-raw(memory:NVMM), width=1280, height=720, framerate=30/1, format=NV12 ! nvvidconv flip-method=0 ! video/x-raw, format=BGRx ! videoconvert ! video/x-raw, format=BGR ! appsink drop=1"
pose:
  model: "yolov8n-pose.pt"
  device: "cuda"
  confidence_threshold: 0.5
  iou_threshold: 0.7
  target_person_id: 0
  keypoint_confidence_min: 0.3
inference:
  inference_every_n_frames: 2
  input_size: 640
  half_precision: true
privacy:
  store_raw_frames: false
  store_keypoints_only: true
  blur_face_in_debug: true
output:
  db_path: "./data/vigil.db"
  socket_enabled: false
  socket_port: 5557
  show_debug_window: true
  debug_draw_skeleton: true
  debug_draw_bbox: true
logging:
  level: "INFO"
  log_to_file: false
  log_path: "./logs/pipeline.log"